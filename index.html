<!-- ========================================= -->
<!--  VISOR DE PARTIDAS INTERACTIVO (reemplaza esto por tu iframe) -->
<!-- ========================================= -->
<section id="visor-partidas" style="padding: 40px 20px; max-width: 1100px; margin: auto;">
    <h2 style="text-align: center; font-size: 32px; margin-bottom: 40px; color: #2563eb;">Partidas destacadas</h2>
    
    <!-- Selector de partidas (pestañas) -->
    <div style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px;">
        <button class="game-btn active" data-game="short-vera" style="background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 600;">Short vs Vera (2000)</button>
        <!-- Aquí puedes agregar más botones con el mismo formato -->
        <!-- <button class="game-btn" data-game="vera-tomas" style="...">Vera vs Tomás</button> -->
    </div>

    <!-- Contenedor del tablero y controles -->
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div id="board" style="width: 100%; max-width: 500px; margin: 0 auto;"></div>
        
        <div style="display: flex; gap: 20px; margin: 20px 0;">
            <button id="prevBtn" style="background: #1e293b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">← Anterior</button>
            <button id="nextBtn" style="background: #1e293b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Siguiente →</button>
        </div>
        
        <!-- Lista de jugadas -->
        <div id="moveList" style="background: #1e293b; border-radius: 12px; padding: 15px; width: 100%; max-width: 500px; max-height: 200px; overflow-y: auto; font-family: monospace; color: #cbd5e1; border: 1px solid #334155;">
            <p style="text-align: center;">Las jugadas aparecerán aquí</p>
        </div>
    </div>
</section>

<!-- IMPORTAR BIBLIOTECAS (asegúrate de que estén en el <head> o al final del body) -->
<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
// Definimos las partidas en formato PGN (puedes añadir más)
const games = {
    'short-vera': {
        pgn: `[Event "VII Open (Linares CHI)"]
[Site "Linares, Chile"]
[Date "2000.06.24"]
[Round "3"]
[White "Short, Nigel D"]
[Black "Vera, Sergio"]
[Result "1-0"]
[WhiteElo "2683"]
[BlackElo "2080"]
[ECO "B20"]

1.e4 c5 2.b3 Nc6 3.Bb2 Nf6 4.e5 Nd5 5.Nf3 e6 6.Nc3 Nxc3 7.Bxc3 Be7 8.Bb5 Qc7 9.a4 O-O 10.a5 f6 11.Qe2 Nb4 12.O-O Nd5 13.Bb2 Kh8 14.Bc4 Nf4 15.Qe3 Ng6 16.Bd3 f5 17.Rfe1 Rb8 18.c4 b6 19.a6 Re8 20.g3 Rf8 21.h4 Rf7 22.h5 Nf8 23.Bf1 Qd8 24.d4 cxd4 25.Bxd4 Kg8 26.Rab1 Bb4 27.Ng5 1-0`,
        name: 'Short vs Vera (2000)'
    }
    // Aquí puedes agregar más, por ejemplo:
    // 'vera-tomas': { pgn: '...', name: 'Vera vs Tomás' },
};

let currentGameKey = 'short-vera'; // partida activa
let game = new Chess();
let board = null;
let moveHistory = [];
let currentMoveIndex = -1;

// Inicializar tablero
function initBoard() {
    const config = {
        draggable: false,
        position: 'start',
        pieceTheme: 'https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/img/chesspieces/wikipedia/{piece}.png',
        size: 400 // puedes ajustar, en móvil se escala con CSS
    };
    board = Chessboard('board', config);
    $(window).resize(() => board.resize());
}

// Cargar una partida por su clave
function loadGame(gameKey) {
    const gameData = games[gameKey];
    if (!gameData) return;
    
    game.reset();
    game.load_pgn(gameData.pgn);
    moveHistory = game.history({ verbose: true });
    currentMoveIndex = -1;
    
    // Posición inicial
    board.position('start');
    updateMoveList();
    updateButtons();
}

// Actualizar lista de jugadas
function updateMoveList() {
    const moveListDiv = document.getElementById('moveList');
    if (!moveListDiv) return;
    
    let html = '<table style="width:100%; border-collapse: collapse;">';
    for (let i = 0; i < moveHistory.length; i += 2) {
        const moveNumber = Math.floor(i/2) + 1;
        const whiteMove = moveHistory[i] ? moveHistory[i].san : '';
        const blackMove = moveHistory[i+1] ? moveHistory[i+1].san : '';
        const whiteClass = (i === currentMoveIndex) ? 'current-move' : '';
        const blackClass = (i+1 === currentMoveIndex) ? 'current-move' : '';
        
        html += `<tr>
            <td style="padding: 4px; color: #94a3b8;">${moveNumber}.</td>
            <td style="padding: 4px; cursor: pointer; ${whiteClass ? 'background: #2563eb; color: white; border-radius: 4px;' : ''}" onclick="jumpToMove(${i})">${whiteMove}</td>
            <td style="padding: 4px; cursor: pointer; ${blackClass ? 'background: #2563eb; color: white; border-radius: 4px;' : ''}" onclick="jumpToMove(${i+1})">${blackMove}</td>
        </tr>`;
    }
    html += '</table>';
    moveListDiv.innerHTML = html;
    
    // Scroll al movimiento actual
    const currentElement = moveListDiv.querySelector('.current-move');
    if (currentElement) {
        currentElement.scrollIntoView({ block: 'nearest' });
    }
}

// Ir a un movimiento específico
function jumpToMove(index) {
    if (index < -1 || index >= moveHistory.length) return;
    currentMoveIndex = index;
    
    // Reconstruir posición hasta ese movimiento
    game.reset();
    for (let i = 0; i <= index; i++) {
        game.move(moveHistory[i]);
    }
    board.position(game.fen());
    updateMoveList();
    updateButtons();
}

// Botones siguiente/anterior
function nextMove() {
    if (currentMoveIndex < moveHistory.length - 1) {
        jumpToMove(currentMoveIndex + 1);
    }
}

function prevMove() {
    if (currentMoveIndex > -1) {
        jumpToMove(currentMoveIndex - 1);
    }
}

function updateButtons() {
    document.getElementById('prevBtn').disabled = (currentMoveIndex <= -1);
    document.getElementById('nextBtn').disabled = (currentMoveIndex >= moveHistory.length - 1);
}

// Cambiar de partida al hacer clic en las pestañas
document.querySelectorAll('.game-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentGameKey = this.dataset.game;
        loadGame(currentGameKey);
    });
});

// Iniciar todo
initBoard();
loadGame('short-vera');
</script>

<style>
/* Estilos para el visor */
#board {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
}
.game-btn.active {
    background: #2563eb !important;
    color: white !important;
}
#moveList .current-move {
    background: #2563eb;
    color: white;
    border-radius: 4px;
}
#prevBtn:disabled, #nextBtn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}
</style>
<!-- ========================================= -->
<!-- FIN DEL VISOR -->
<!-- ========================================= -->
