<script>
let board;
let game = new Chess();
let moves = [];
let moveIndex = 0;

function initBoard() {
    board = Chessboard('tablero', {
        position: 'start',
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    // LEEMOS TU ARCHIVO SUBIDO A GITHUB
    fetch("mate_caballo.pgn")
    .then(response => response.text())
    .then(data => {
        game.load_pgn(data);
        moves = game.history();
        game.reset();
        board.start();
    })
    .catch(err => console.error("Error cargando PGN:", err));
}

$(document).ready(initBoard);

function actualizar() { board.position(game.fen()); }
function adelante() { if (moveIndex < moves.length) { game.move(moves[moveIndex]); moveIndex++; actualizar(); } }
function atras() { if (moveIndex > 0) { game.undo(); moveIndex--; actualizar(); } }
function inicio() { game.reset(); moveIndex = 0; actualizar(); }
function final() { while (moveIndex < moves.length) { game.move(moves[moveIndex]); moveIndex++; } actualizar(); }

ScrollReveal().reveal('section',{delay:200,distance:'40px',origin:'bottom',duration:800});
</script>
